name: Weekly Progress Update

on:
  schedule:
    # Monday 09:00 in New Zealand Standard Time is Sunday 21:00 UTC.
    - cron: "0 21 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  weekly-progress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Create weekly progress issue
        run: node scripts/create-weekly-update.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

